name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  lint-powershell:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install latest PowerShell
        uses: PSModule/install-powershell@v1
        with:
          Version: latest

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable.PSVersion

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber

      - name: Run lint
        shell: pwsh
        run: ./tools/Run-PowerShellLint.ps1

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./Sage/Sage.psd1

  lint-markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !legacy/**

  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install latest PowerShell
        uses: PSModule/install-powershell@v1
        with:
          Version: latest

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable.PSVersion

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.6.0 -Scope CurrentUser -Force -AllowClobber

      - name: Install SecretManagement
        shell: pwsh
        run: Install-Module -Name Microsoft.PowerShell.SecretManagement -Scope CurrentUser -Force -AllowClobber

      - name: Run unit tests
        shell: pwsh
        run: ./tools/Run-Tests.ps1

